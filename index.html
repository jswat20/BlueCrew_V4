<body>
  <div class="app-shell" data-testid="app-shell">
    <aside class="sidebar" data-testid="sidebar">
      <div class="brand" data-testid="brand">
        <div class="brand-icon">⚾</div>
        <div>
          <h1>BlueCrew</h1>
          <p>Umpire Portal</p>
        </div>
      </div>

      <nav class="nav-menu" data-testid="navigation">
        <button class="nav-link active" data-page="dashboard" data-testid="nav-dashboard">🏠 Dashboard</button>
        <button class="nav-link" data-page="schedule" data-testid="nav-schedule">📅 Schedule</button>
        <button class="nav-link" data-page="crew" data-testid="nav-crew">👥 Crew</button>
        <button class="nav-link" data-page="reports" data-testid="nav-reports">📈 Reports</button>
        <button
          class="nav-link"
          data-page="season-dashboard"
          data-testid="nav-season-dashboard"
        >
          📊 Season Dashboard
        </button>

        <button
          class="nav-link"
          data-page="assigner-workbench"
          data-testid="nav-assigner-workbench"
        >
          🧰 Assigner Workbench
        </button>
        <button
          type="button"
          class="nav-link"
          data-page="operations-center"
          data-testid="nav-operations-center"
        >
          Operations Center
        </button>
        <button class="nav-link" data-page="settings" data-testid="nav-settings">⚙ Settings</button>
        <button class="nav-link" data-page="admin" data-testid="nav-admin">🛠 Admin</button>
        <button class="nav-link" data-page="login" data-testid="nav-login"> Login </button>
        <button class="nav-link" data-page="accounts" data-testid="nav-accounts"> Accounts </button>
        <button class="nav-link" data-page="claim-games" data-testid="nav-claim-games"> Claim Games </button> 
        <button class="nav-link" data-page="my-claims" data-testid="nav-my-claims"> My Claims </button>
        <button class="nav-link" data-page="claims-queue" data-testid="nav-claims-queue"> Claims Queue </button>
        <button class="nav-link" data-page="claim-history" data-testid="nav-claim-history"> Claim History </button>
        <button  type="button" class="nav-link" data-page="availability" data-testid="nav-availability"> Availability </button>
        <button class="nav-link" data-page="notifications" data-testid="nav-notifications"> Notifications <span data-testid="notifications-badge"></span>
</button>
        <button
          class="nav-link"
          data-page="profile"
          data-testid="nav-profile"
        >
          👤 Profile
        </button>
      </button>

      </nav>
    </aside>

    <main class="main-content" data-testid="main-content">
      <header class="topbar" data-testid="page-header">
        <div>
          <h2 id="page-title" data-testid="page-title">Dashboard</h2>
          <p id="page-subtitle" data-testid="page-subtitle">Your BlueCrew command center.</p>
        </div>

        <div class="role-switcher" data-testid="role-switcher">
          <span>View:</span>
          <button id="admin-role-btn" class="role-btn active" data-testid="role-admin">Admin</button>
          <button id="umpire-role-btn" class="role-btn" data-testid="role-umpire">Umpire</button>
        </div>
      </header>

      <section id="app-content" class="content-area" data-testid="app-content"></section>
    </main>
  </div>
